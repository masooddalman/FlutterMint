name: fluttermint
description: A CLI tool to generate Flutter projects with pre-configured architecture and modules.
version: 0.2.1
repository: https://github.com/masooddalman/FlutterMint
issue_tracker: https://github.com/masooddalman/FlutterMint/issues
topics:
  - cli
  - flutter
  - code-generation
  - project-template
  - developer-tools

environment:
  sdk: ^3.0.0

executables:
  fluttermint: fluttermint

dependencies:
  args: ^2.6.0
  path: ^1.9.0
  yaml: ^3.1.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
